<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f6f8fc">
  <title>404 - FlightWatcher</title>
<script src="js/runtime.js?v=8.8.0"></script>
  <link href="vendor/bootstrap.min.css?v=8.8.0" rel="stylesheet"/>
  <script>window.FontAwesomeConfig = { autoReplaceSvg: 'nest', observeMutations: true, showMissingIcons: false };</script>
<script defer src="vendor/fontawesome/all.min.js?v=8.8.0"></script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="css/style.css?v=8.8.0">
</head>
<body class="d-flex align-items-center min-vh-100">
  <main class="container text-center py-5">
    <div class="mx-auto admin-panel" style="max-width:620px">
      <span class="admin-brand-mark mx-auto mb-4"><i class="fa-solid fa-plane-slash"></i></span>
      <p class="section-eyebrow">ERROR 404</p>
      <h1 class="fw-black mb-3" style="font-weight:900">Không tìm thấy trang</h1>
      <p class="text-muted mb-4">Đường dẫn có thể đã thay đổi hoặc không tồn tại. Hãy quay lại trang chính của FlightWatcher.</p>
      <a class="btn btn-primary rounded-pill fw-bold px-4" href="index.html"><i class="fa-solid fa-house me-2"></i>Về trang chủ</a>
    </div>
  </main>
  <script>
    const mode = localStorage.getItem('theme_mode') || localStorage.getItem('theme') || 'auto';
    const dark = mode === 'dark' || (mode === 'auto' && matchMedia('(prefers-color-scheme:dark)').matches);
    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    document.body.dataset.theme = dark ? 'dark' : 'light';
  </script>
</body>
</html>
