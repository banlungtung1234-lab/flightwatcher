services:
  - type: web
    name: flightwatcher-fit4015
    runtime: static
    plan: free
    buildCommand: echo "FlightWatcher static site ready"
    staticPublishPath: .
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /img/*
        name: Cache-Control
        value: public, max-age=2592000, immutable
      - path: /vendor/*
        name: Cache-Control
        value: public, max-age=2592000, immutable
      - path: /admin*
        name: X-Robots-Tag
        value: noindex, nofollow
      - path: /login*
        name: X-Robots-Tag
        value: noindex, nofollow
    routes:
      - type: rewrite
        source: /admin
        destination: /admin.html
      - type: rewrite
        source: /login
        destination: /login.html
